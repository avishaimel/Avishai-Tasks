services:
  - type: web
    name: avishai-day-manager
    runtime: node
    rootDir: avishai-day-manager-v0.2-ready
    region: frankfurt
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile=false && pnpm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TASKS_FILE
        value: /tmp/tasks.json
      - key: APP_DOMAIN
        sync: false
