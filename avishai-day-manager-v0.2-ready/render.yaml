services:
  - type: web
    name: avishai-day-manager
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: TASKS_FILE
        value: /var/data/tasks.json
      - key: APP_DOMAIN
        sync: false
    disk:
      name: task-data
      mountPath: /var/data
      sizeGB: 5
